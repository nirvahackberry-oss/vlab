name: Deploy Python Lab Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "lambda/**"
      - "lab-images/**"
      - "scripts/**"
      - "../backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes after plan"
        type: boolean
        default: false
      destroy:
        description: "Run terraform destroy (dangerous)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  PROJECT_NAME: vlab
  ENVIRONMENT: dev
  LAB_TYPES: "python java linux dbms agilemethodology android bigdata datascience dotnet softwareengeering testing"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push lab images
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"

          ensure_repo() {
            aws ecr describe-repositories --repository-names "$1" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$1"
          }

          for suffix in lab-base-linux lab-base-python lab-base-java; do
            ensure_repo "${PROJECT_NAME}-${ENVIRONMENT}-${suffix}"
          done

          docker build -f lab-images/base/linux/Dockerfile \
            -t "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-linux:latest" .
          docker push "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-linux:latest"

          docker build -f lab-images/base/python/Dockerfile \
            -t "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-python:latest" .
          docker push "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-python:latest"

          docker build -f lab-images/base/java/Dockerfile \
            -t "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-java:latest" .
          docker push "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-java:latest"

          base_linux="${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-linux:latest"
          base_python="${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-python:latest"
          base_java="${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-java:latest"

          for lab in ${LAB_TYPES}; do
            repo_name="${PROJECT_NAME}-${ENVIRONMENT}-${lab}"
            ensure_repo "${repo_name}"
            image_uri="${registry}/${repo_name}:latest"

            case "${lab}" in
              python|datascience)
                base_uri="${base_python}" ;;
              java|softwareengeering)
                base_uri="${base_java}" ;;
              linux|bigdata|agilemethodology|android|testing)
                base_uri="${base_linux}" ;;
              *)
                base_uri="" ;;
            esac

            if [ -n "${base_uri}" ]; then
              docker build -f "lab-images/${lab}/Dockerfile" \
                --build-arg "LAB_BASE_IMAGE=${base_uri}" \
                -t "${image_uri}" .
            else
              docker build -f "lab-images/${lab}/Dockerfile" -t "${image_uri}" .
            fi
            docker push "${image_uri}"
          done

  terraform-plan:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package Node.js Lambdas
        working-directory: ${{ github.workspace }}
        run: bash vlab/scripts/package-node-lambdas.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}" \
            -out tfplan

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package Node.js Lambdas
        working-directory: ${{ github.workspace }}
        run: bash vlab/scripts/package-node-lambdas.sh

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}"

  terraform-destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.destroy == true
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}"
