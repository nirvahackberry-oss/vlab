name: Deploy Python Lab Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "lambda/**"
      - "lab-images/**"
      - "lab_server.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes after plan"
        type: boolean
        default: false
      destroy:
        description: "Run terraform destroy (dangerous)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  PROJECT_NAME: python-lab
  ENVIRONMENT: dev
  LAB_TYPES: "python java linux dbms"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push lab images
        run: |
          for lab in ${LAB_TYPES}; do
            repo_name="${PROJECT_NAME}-${ENVIRONMENT}-${lab}-lab"
            aws ecr describe-repositories --repository-names "${repo_name}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${repo_name}"
            image_uri="${{ steps.login-ecr.outputs.registry }}/${repo_name}:latest"
            docker build -f "lab-images/${lab}/Dockerfile" -t "${image_uri}" "lab-images/${lab}"
            docker push "${image_uri}"
          done

  terraform-plan:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}" \
            -out tfplan

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}"

  terraform-destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.destroy == true
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}"
