name: Deploy Python Lab Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "lab-images/base/**"
      - "lab-images/common/**"
      - "lab-images/python/**"
      - "lab-images/java/**"
      - "lab-images/linux/**"
      - "lab-images/dbms/**"
      - "lab-images/bigdata/**"
      - "lab-images/datascience/**"
      - "lab-images/dotnet/**"
      - "lab-images/softwareengeering/**"
      - "lab-images/testing/**"
      - "lab-images/android/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes after plan"
        type: boolean
        default: false
      destroy:
        description: "Run terraform destroy (dangerous)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  PROJECT_NAME: vlab
  ENVIRONMENT: dev
  LAB_TYPES: "python java linux dbms android bigdata datascience dotnet softwareengeering testing"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      labs: ${{ steps.set.outputs.labs }}
      base_linux: ${{ steps.set.outputs.base_linux }}
      base_python: ${{ steps.set.outputs.base_python }}
      base_java: ${{ steps.set.outputs.base_java }}
      run_terraform: ${{ steps.set.outputs.run_terraform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base-linux:
              - 'lab-images/base/linux/**'
            base-python:
              - 'lab-images/base/python/**'
            base-java:
              - 'lab-images/base/java/**'
            lab-python:
              - 'lab-images/python/**'
              - 'lab-images/base/python/**'
              - 'lab-images/common/lab_server.py'
            lab-java:
              - 'lab-images/java/**'
              - 'lab-images/base/java/**'
              - 'lab-images/common/lab_server.py'
            lab-linux:
              - 'lab-images/linux/**'
              - 'lab-images/base/linux/**'
              - 'lab-images/common/lab_server.py'
            lab-dbms:
              - 'lab-images/dbms/**'
              - 'lab-images/common/lab_server.py'
            lab-bigdata:
              - 'lab-images/bigdata/**'
              - 'lab-images/base/java/**'
              - 'lab-images/common/lab_server.py'
            lab-datascience:
              - 'lab-images/datascience/**'
              - 'lab-images/base/python/**'
              - 'lab-images/common/lab_server.py'
            lab-dotnet:
              - 'lab-images/dotnet/**'
              - 'lab-images/common/lab_server.py'
            lab-softwareengeering:
              - 'lab-images/softwareengeering/**'
              - 'lab-images/base/java/**'
              - 'lab-images/common/install-code-server.sh'
              - 'lab-images/common/drawio-landing.html'
            lab-testing:
              - 'lab-images/testing/**'
              - 'lab-images/base/linux/**'
              - 'lab-images/common/lab_server.py'
            lab-android:
              - 'lab-images/android/**'
              - 'lab-images/base/linux/**'
              - 'lab-images/common/lab_server.py'
            terraform:
              - 'terraform/**'
            workflow:
              - '.github/workflows/deploy.yml'

      - id: set
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'labs=["python","java","linux","dbms","android","bigdata","datascience","dotnet","softwareengeering","testing"]' >> "$GITHUB_OUTPUT"
            echo "base_linux=true" >> "$GITHUB_OUTPUT"
            echo "base_python=true" >> "$GITHUB_OUTPUT"
            echo "base_java=true" >> "$GITHUB_OUTPUT"
            echo "run_terraform=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          labs=()
          [ "${{ steps.filter.outputs.lab-python }}" = "true" ] && labs+=("python")
          [ "${{ steps.filter.outputs.lab-java }}" = "true" ] && labs+=("java")
          [ "${{ steps.filter.outputs.lab-linux }}" = "true" ] && labs+=("linux")
          [ "${{ steps.filter.outputs.lab-dbms }}" = "true" ] && labs+=("dbms")
          [ "${{ steps.filter.outputs.lab-bigdata }}" = "true" ] && labs+=("bigdata")
          [ "${{ steps.filter.outputs.lab-datascience }}" = "true" ] && labs+=("datascience")
          [ "${{ steps.filter.outputs.lab-dotnet }}" = "true" ] && labs+=("dotnet")
          [ "${{ steps.filter.outputs.lab-softwareengeering }}" = "true" ] && labs+=("softwareengeering")
          [ "${{ steps.filter.outputs.lab-testing }}" = "true" ] && labs+=("testing")
          [ "${{ steps.filter.outputs.lab-android }}" = "true" ] && labs+=("android")

          if [ "${#labs[@]}" -eq 0 ]; then
            echo 'labs=[]' >> "$GITHUB_OUTPUT"
          else
            labs_json="$(printf '%s\n' "${labs[@]}" | jq -R . | jq -s -c .)"
            echo "labs=${labs_json}" >> "$GITHUB_OUTPUT"
          fi

          echo "base_linux=${{ steps.filter.outputs.base-linux }}" >> "$GITHUB_OUTPUT"
          echo "base_python=${{ steps.filter.outputs.base-python }}" >> "$GITHUB_OUTPUT"
          echo "base_java=${{ steps.filter.outputs.base-java }}" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.filter.outputs.terraform }}" = "true" ] || [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            echo "run_terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_terraform=false" >> "$GITHUB_OUTPUT"
          fi

  ensure-ecr-repos:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.labs != '[]' || needs.prepare.outputs.base_linux == 'true' || needs.prepare.outputs.base_python == 'true' || needs.prepare.outputs.base_java == 'true'
    environment: dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Ensure all ECR repositories exist
        run: |
          set -euo pipefail
          for suffix in lab-base-linux lab-base-python lab-base-java; do
            aws ecr describe-repositories --repository-names "${PROJECT_NAME}-${ENVIRONMENT}-${suffix}" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "${PROJECT_NAME}-${ENVIRONMENT}-${suffix}"
          done
          for lab in ${LAB_TYPES}; do
            repo_name="${PROJECT_NAME}-${ENVIRONMENT}-${lab}"
            aws ecr describe-repositories --repository-names "${repo_name}" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "${repo_name}"
          done

  build-base-images:
    runs-on: ubuntu-latest
    needs: [prepare, ensure-ecr-repos]
    if: needs.prepare.outputs.base_linux == 'true' || needs.prepare.outputs.base_python == 'true' || needs.prepare.outputs.base_java == 'true'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push linux base image
        if: needs.prepare.outputs.base_linux == 'true'
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          docker build -f lab-images/base/linux/Dockerfile \
            -t "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-linux:latest" .
          docker push "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-linux:latest"

      - name: Build and push python base image
        if: needs.prepare.outputs.base_python == 'true'
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          docker build -f lab-images/base/python/Dockerfile \
            -t "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-python:latest" .
          docker push "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-python:latest"

      - name: Build and push java base image
        if: needs.prepare.outputs.base_java == 'true'
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          docker build -f lab-images/base/java/Dockerfile \
            -t "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-java:latest" .
          docker push "${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-java:latest"

  build-lab-images:
    runs-on: ubuntu-latest
    needs: [prepare, ensure-ecr-repos, build-base-images]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.labs != '[]' &&
      (needs.build-base-images.result == 'success' || needs.build-base-images.result == 'skipped') &&
      (needs.ensure-ecr-repos.result == 'success' || needs.ensure-ecr-repos.result == 'skipped')
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        lab: ${{ fromJson(needs.prepare.outputs.labs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.lab }} image
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          lab="${{ matrix.lab }}"
          repo_name="${PROJECT_NAME}-${ENVIRONMENT}-${lab}"
          image_uri="${registry}/${repo_name}:latest"

          base_linux="${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-linux:latest"
          base_python="${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-python:latest"
          base_java="${registry}/${PROJECT_NAME}-${ENVIRONMENT}-lab-base-java:latest"

          case "${lab}" in
            python|datascience)
              base_uri="${base_python}" ;;
            java|softwareengeering|bigdata)
              base_uri="${base_java}" ;;
            linux|android|testing)
              base_uri="${base_linux}" ;;
            *)
              base_uri="" ;;
          esac

          if [ -n "${base_uri}" ]; then
            docker build -f "lab-images/${lab}/Dockerfile" \
              --build-arg "LAB_BASE_IMAGE=${base_uri}" \
              -t "${image_uri}" .
          else
            docker build -f "lab-images/${lab}/Dockerfile" -t "${image_uri}" .
          fi
          docker push "${image_uri}"

  terraform-plan:
    runs-on: ubuntu-latest
    needs: [prepare, build-lab-images, build-base-images]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.run_terraform == 'true' &&
      (needs.build-lab-images.result == 'success' || needs.build-lab-images.result == 'skipped') &&
      (needs.build-base-images.result == 'success' || needs.build-base-images.result == 'skipped')
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}" \
            -out tfplan

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}"

  terraform-destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.destroy == true
    environment: dev
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var "region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "environment=${ENVIRONMENT}"
